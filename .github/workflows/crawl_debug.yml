name: Monitor Crawler Debug

on:
  workflow_dispatch:
    inputs:
      site:
        description: '테스트할 사이트 (kenya_jumia / nigeria_jumia / ghana_compughana, 비우면 전체)'
        required: false
        default: ''

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: monitor_tracker

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: monitor_tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p data

      - name: Run debug crawler
        run: python debug_crawler.py ${{ github.event.inputs.site }}
        env:
          PYTHONPATH: .
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}

      - name: Commit debug results
        if: always()
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add data/debug_results.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "debug: crawler diagnosis $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✅ debug_results.json 커밋 완료"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-results-${{ github.run_id }}
          path: monitor_tracker/data/debug_results.json
          retention-days: 7
