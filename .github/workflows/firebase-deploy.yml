name: Firebase 자동 배포

on:
  push:
    branches: [ main, claude/2d-game-catch-animals-fe2WK ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 서비스 계정 키 파일 생성
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /home/runner/sa.json

      - name: Firebase Hosting 배포
        run: npx firebase-tools@latest deploy --only hosting --project my-africa-project-3d79c
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/sa.json
