name: Weekly Monitor Price Scraper

# ────────────────────────────────────────────────────────────────
# 이 workflow는 self-hosted runner (로컬 PC)에서 실행됩니다.
#
# 왜 self-hosted인가?
#   Jumia.co.ke / Jumia.com.ng / CompuGhana.com은
#   GitHub Actions의 클라우드 IP를 WAF로 차단합니다.
#   로컬 PC에서 실행하면 일반 residential IP가 사용되어 차단되지 않습니다.
#
# self-hosted runner 설치:
#   1. GitHub 저장소 → Settings → Actions → Runners → New self-hosted runner
#   2. 화면 안내에 따라 로컬 PC에 runner 설치
#   3. runner 실행: ./run.sh
# ────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 6 * * 1"   # 매주 월요일 06:00 UTC (로컬 PC가 켜져 있어야 함)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  scrape:
    runs-on: self-hosted    # ← 로컬 PC runner

    defaults:
      run:
        working-directory: monitor_tracker

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Create directories
        run: mkdir -p data logs exports

      - name: Run crawler
        run: python run_local.py --pages 10
        env:
          PYTHONPATH: .

      - name: Commit & push DB
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@noreply"
          git add data/monitors.db
          git diff --cached --quiet || git commit -m "data: monitor prices $(date +'%Y-%m-%d')"
          git push origin HEAD
