name: Weekly Monitor Price Scraper

on:
  schedule:
    # 매주 월요일 오전 6시 (UTC) 자동 실행
    - cron: "0 6 * * 1"
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monitor_tracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: monitor_tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create data & log directories
        run: mkdir -p data logs exports

      - name: Download existing DB from artifacts (if exists)
        uses: dawidd6/action-download-artifact@v3
        with:
          name: monitors-db
          path: monitor_tracker/data/
        continue-on-error: true  # 처음 실행 시 artifact 없어도 OK

      - name: Run scraper
        run: python main.py
        env:
          PYTHONPATH: .

      - name: Upload DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitors-db
          path: monitor_tracker/data/monitors.db
          retention-days: 90

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawl-logs-${{ github.run_id }}
          path: monitor_tracker/logs/
          retention-days: 30

      - name: Commit updated DB to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monitors.db || true
          git diff --cached --quiet || git commit -m "chore: weekly monitor price update $(date +'%Y-%m-%d')"
          git push origin HEAD
        continue-on-error: true  # DB 변경 없으면 커밋 실패해도 OK
