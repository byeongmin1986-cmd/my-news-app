name: Weekly Monitor Price Scraper

on:
  schedule:
    - cron: "0 6 * * 1"   # 매주 월요일 06:00 UTC 자동 실행
  workflow_dispatch:        # Streamlit 버튼 / GitHub 수동 실행

jobs:
  scrape:
    runs-on: ubuntu-latest  # GitHub 클라우드 runner + ScraperAPI 프록시

    defaults:
      run:
        working-directory: monitor_tracker

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: monitor_tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data logs exports

      - name: Run crawler
        run: python run_crawler.py
        env:
          PYTHONPATH: .
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          MAX_PAGES: "10"

      - name: Commit & push results
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add data/monitors.csv data/monitors.db || true
          git diff --cached --quiet || \
            git commit -m "data: monitor prices $(date +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs-${{ github.run_id }}
          path: monitor_tracker/logs/
          retention-days: 14
