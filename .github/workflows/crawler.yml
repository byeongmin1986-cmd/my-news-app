name: Monitor Price Crawler

on:
  schedule:
    - cron: "0 6 * * 1"   # 매주 월요일 06:00 UTC
  workflow_dispatch:
    inputs:
      site:
        description: '특정 사이트만 실행 (kenya_jumia / nigeria_jumia / ghana_compughana, 비우면 전체)'
        required: false
        default: ''
      max_pages:
        description: '사이트당 최대 페이지 수'
        required: false
        default: '10'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: monitor_tracker

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check SCRAPERAPI_KEY is set
        run: |
          if [ -z "$SCRAPERAPI_KEY" ]; then
            echo "::error::SCRAPERAPI_KEY가 GitHub Secrets에 없습니다."
            echo "::error::Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "SCRAPERAPI_KEY 확인됨 (length=${#SCRAPERAPI_KEY})"
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: monitor_tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test ScraperAPI connectivity
        run: |
          echo "=== ScraperAPI 연결 테스트 ==="
          HTTP_STATUS=$(curl -s -o /tmp/scraper_resp.txt -w "%{http_code}" \
            "http://api.scraperapi.com/?api_key=${SCRAPERAPI_KEY}&url=https://httpbin.org/ip" \
            --max-time 30)
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/scraper_resp.txt
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::ScraperAPI 연결 실패 (status=$HTTP_STATUS)"
            echo "::error::scraperapi.com 대시보드에서 API Key와 잔여 크레딧을 확인하세요."
            exit 1
          fi
          echo "✅ ScraperAPI 정상 작동"
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}

      - name: Create output directories
        run: mkdir -p data logs

      - name: Run crawler (Jumia Kenya)
        if: ${{ github.event.inputs.site == '' || github.event.inputs.site == 'kenya_jumia' }}
        run: python run_crawler.py kenya_jumia
        env:
          PYTHONPATH: .
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '10' }}
        continue-on-error: true

      - name: Run crawler (Jumia Nigeria)
        if: ${{ github.event.inputs.site == '' || github.event.inputs.site == 'nigeria_jumia' }}
        run: python run_crawler.py nigeria_jumia
        env:
          PYTHONPATH: .
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '10' }}
        continue-on-error: true

      - name: Run crawler (CompuGhana)
        if: ${{ github.event.inputs.site == '' || github.event.inputs.site == 'ghana_compughana' }}
        run: python run_crawler.py ghana_compughana
        env:
          PYTHONPATH: .
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '10' }}
        continue-on-error: true

      # crawl_status.json을 항상 커밋 (실패해도) → Streamlit에서 상태 확인용
      - name: Commit results to repository
        if: always()
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"

          # crawl_status.json은 항상 커밋 (Streamlit 상태 표시용)
          git add data/crawl_status.json 2>/dev/null || true
          # CSV와 DB는 존재할 때만 커밋
          [ -f data/monitors.csv ] && git add data/monitors.csv || true
          [ -f data/monitors.db ]  && git add data/monitors.db  || true

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "data: monitor prices $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✅ 커밋 및 푸시 완료"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs-${{ github.run_id }}
          path: monitor_tracker/logs/
          retention-days: 14

      - name: Upload CSV as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitors-csv-${{ github.run_id }}
          path: monitor_tracker/data/monitors.csv
          retention-days: 30
          if-no-files-found: warn

      # 0개 수집이면 워크플로우를 FAILURE로 표시 (커밋 후에 실행)
      - name: Verify collected data
        run: |
          if [ ! -f data/monitors.csv ]; then
            echo "::error::failed: 0 products collected — monitors.csv 없음"
            exit 1
          fi
          ROWS=$(tail -n +2 data/monitors.csv | wc -l)
          echo "CSV rows: $ROWS"
          if [ "$ROWS" -eq 0 ]; then
            echo "::error::failed: 0 products collected — CSV 0행"
            exit 1
          fi
          echo "✅ $ROWS개 수집 완료"
