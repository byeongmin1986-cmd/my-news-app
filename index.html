<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Mini Golf Putt</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Login Screen -->
  <div id="screen-login" class="screen active">
    <div class="login-container">
      <div class="logo">
        <div class="logo-icon">⛳</div>
        <h1>Mini Golf Putt</h1>
        <p class="logo-sub">글로벌 퍼팅 챌린지</p>
      </div>
      <div class="login-card">
        <p class="login-desc">구글 계정으로 로그인하고<br/>전 세계 플레이어와 경쟁하세요!</p>
        <button id="btn-google-login" class="btn-google">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Google로 로그인
        </button>
        <div id="login-error" class="login-error hidden"></div>
      </div>
      <div class="login-footer">
        <button id="btn-guest-play" class="btn-guest">게스트로 플레이</button>
      </div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="screen-game" class="screen hidden">
    <div class="game-hud">
      <div class="hud-left">
        <div class="hud-item">
          <span class="hud-label">STAGE</span>
          <span id="hud-stage" class="hud-value">1</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">PAR</span>
          <span id="hud-par" class="hud-value">3</span>
        </div>
      </div>
      <div class="hud-center">
        <div class="hud-item">
          <span class="hud-label">STROKES</span>
          <span id="hud-strokes" class="hud-value">0</span>
        </div>
      </div>
      <div class="hud-right">
        <div class="hud-item">
          <span class="hud-label">SCORE</span>
          <span id="hud-score" class="hud-value">0</span>
        </div>
        <div class="hud-lives" id="hud-lives">
          <span class="life-icon">❤️</span>
          <span class="life-icon">❤️</span>
          <span class="life-icon">❤️</span>
        </div>
      </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div class="game-controls-hint" id="controls-hint">
      <span>당겨서 퍼팅하세요</span>
    </div>

    <div class="shot-power-bar" id="power-bar-container">
      <div class="power-bar-track">
        <div id="power-bar-fill" class="power-bar-fill"></div>
      </div>
      <span id="power-label" class="power-label">0%</span>
    </div>

    <button id="btn-menu" class="btn-menu">☰</button>
  </div>

  <!-- Stage Clear Overlay -->
  <div id="overlay-stage-clear" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-icon">🎉</div>
      <h2 id="clear-title">홀인!</h2>
      <div class="clear-stats">
        <div class="stat-row">
          <span>타수</span>
          <span id="clear-strokes">-</span>
        </div>
        <div class="stat-row">
          <span>파</span>
          <span id="clear-par">-</span>
        </div>
        <div class="stat-row highlight">
          <span>결과</span>
          <span id="clear-result">-</span>
        </div>
        <div class="stat-row">
          <span>획득 점수</span>
          <span id="clear-points">+0</span>
        </div>
      </div>
      <button id="btn-next-stage" class="btn-primary">다음 스테이지</button>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="overlay-game-over" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-icon">💔</div>
      <h2>게임 오버</h2>
      <div class="clear-stats">
        <div class="stat-row">
          <span>도달 스테이지</span>
          <span id="go-stage">-</span>
        </div>
        <div class="stat-row highlight">
          <span>최종 점수</span>
          <span id="go-score">-</span>
        </div>
      </div>
      <button id="btn-restart" class="btn-primary">다시 시작</button>
      <button id="btn-go-rank" class="btn-secondary">랭킹 보기</button>
    </div>
  </div>

  <!-- Menu Overlay -->
  <div id="overlay-menu" class="overlay hidden">
    <div class="overlay-card">
      <h2>메뉴</h2>
      <button id="btn-resume" class="btn-primary">계속하기</button>
      <button id="btn-menu-rank" class="btn-secondary">랭킹</button>
      <button id="btn-menu-restart" class="btn-secondary">처음부터</button>
      <button id="btn-logout" class="btn-danger">로그아웃</button>
    </div>
  </div>

  <!-- Leaderboard Screen -->
  <div id="screen-leaderboard" class="screen hidden">
    <div class="leaderboard-header">
      <button id="btn-back-game" class="btn-back">←</button>
      <h2>🏆 글로벌 랭킹</h2>
      <button id="btn-refresh-rank" class="btn-refresh">↻</button>
    </div>
    <div class="my-rank-card" id="my-rank-card">
      <span class="my-rank-label">나의 순위</span>
      <span id="my-rank-value">-</span>
      <span id="my-rank-score">0점</span>
    </div>
    <div class="leaderboard-list" id="leaderboard-list">
      <div class="loading-spinner">불러오는 중...</div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA23zfEM-6jLV5kYdHVxY0F4ZwftnsQ3lI",
      authDomain: "my-africa-project-3d79c.firebaseapp.com",
      projectId: "my-africa-project-3d79c",
      appId: "1:656175409919:web:e181b29ec44a41c5163aca"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.__firebase = { auth, db, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
      doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp };
  </script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
